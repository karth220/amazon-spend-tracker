<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0c0a09;
      --card-bg: #1c1917;
      --accent-color: #f97316;
      --accent-hover: #ea580c;
      --text-main: #f5f5f4;
      --text-sub: #a8a29e;
      --border-color: #292524;
    }
    
    body {
      font-family: 'Inter', sans-serif;
      width: 320px;
      margin: 0;
      padding: 20px;
      background-color: var(--bg-color);
      color: var(--text-main);
      box-sizing: border-box;
    }
    
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    
    .logo-container {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    
    .logo-img {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 20px;
      color: white;
      box-shadow: 0 4px 10px rgba(249, 115, 22, 0.3);
    }
    
    h1 {
      font-size: 18px;
      margin: 0;
      font-weight: 700;
      letter-spacing: -0.025em;
      background: linear-gradient(to right, #f5f5f4, #d6d3d1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    p {
      font-size: 13px;
      color: var(--text-sub);
      line-height: 1.5;
      margin: 0 0 20px 0;
    }
    
    .btn {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background-color: var(--accent-color);
      color: white;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(249, 115, 22, 0.2);
    }
    
    .btn:hover {
      background-color: var(--accent-hover);
      transform: translateY(-1px);
    }
    
    .btn:active {
      transform: translateY(0);
    }
    
    .status-card {
      width: 100%;
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 15px;
      box-sizing: border-box;
    }
    
    .status-indicator {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      padding: 5px 10px;
      border-radius: 20px;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .status-ready {
      background-color: rgba(34, 197, 94, 0.1);
      color: #4ade80;
      border: 1px solid rgba(34, 197, 94, 0.2);
    }
    
    .status-waiting {
      background-color: rgba(245, 158, 11, 0.1);
      color: #fbbf24;
      border: 1px solid rgba(245, 158, 11, 0.2);
    }
    
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background-color: currentColor;
    }
    
    .footer {
      font-size: 11px;
      color: #78716c;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-container">
      <div class="logo-img">₹</div>
      <h1>Amazon.in Spends</h1>
    </div>
    
    <div class="status-card">
      <div id="statusIndicator" class="status-indicator status-waiting">
        <span class="dot"></span>
        <span id="statusText">Checking Amazon.in...</span>
      </div>
      <p id="statusDesc">Detecting active Amazon India tabs to synchronize credentials.</p>
      <button id="actionBtn" class="btn">Checking...</button>
    </div>
    
    <div class="footer">
      Processing runs 100% locally in your browser.
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
